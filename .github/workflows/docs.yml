name: Docs

# Publishes the DocC site to GitHub Pages on every v* tag.
# Manual runs are also supported via workflow_dispatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.1+)
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Resolve packages
        run: swift package resolve

      - name: Generate DocC archive
        run: |
          swift package --disable-sandbox \
            generate-documentation \
            --target Mojentic \
            --output-path docs \
            --transform-for-static-hosting \
            --hosting-base-path mojentic-sw

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
