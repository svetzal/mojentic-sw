name: Validate, Test, and Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build-macos:
    runs-on: macos-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test --parallel

      - name: Build (release)
        run: swift build -c release

  build-linux:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    container:
      image: swift:6.1
    steps:
      - uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test --parallel

      - name: Build (release)
        run: swift build -c release

  format-check:
    runs-on: macos-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v5

      - name: swift-format lint
        run: swift format lint --strict --recursive Sources Tests

  lint:
    runs-on: macos-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict
