included:
  - Sources
  - Tests

excluded:
  - .build
  - Package.swift

line_length:
  warning: 110
  error: 140
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - ok
    - to
    - on

type_name:
  min_length: 3
  max_length: 50

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 12
  error: 20

disabled_rules:
  - todo

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call
  - yoda_condition

custom_rules:
  no_print_in_library:
    name: "No print() in library code"
    regex: '^[^/]*\bprint\('
    match_kinds:
      - identifier
    message: "Use a swift-log Logger instead of print()."
    severity: warning
    included: "Sources/.*"
