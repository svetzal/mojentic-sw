included:
  - Sources
  - Tests

excluded:
  - .build
  - Package.swift

line_length:
  warning: 110
  error: 140
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - ok
    - to
    - on

type_name:
  min_length: 3
  max_length: 50

function_body_length:
  warning: 100
  error: 150

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 900

cyclomatic_complexity:
  warning: 20
  error: 30

function_parameter_count:
  warning: 7
  error: 10

nesting:
  type_level: 2

disabled_rules:
  - todo
  # swift-format owns these styling decisions end-to-end. Disable in
  # SwiftLint so the two tools don't fight over multi-line collection
  # literals and brace placement after multi-line declarations.
  - trailing_comma
  - opening_brace

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

custom_rules:
  no_print_in_library:
    name: "No print() in library code"
    regex: '^[^/]*\bprint\('
    match_kinds:
      - identifier
    message: "Use a swift-log Logger instead of print()."
    severity: warning
    included: "Sources/.*"
